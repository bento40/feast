<script>
/* ─── Helpers ─── */
const fmt = (n, d=0) => new Intl.NumberFormat("en-US",{maximumFractionDigits:d,minimumFractionDigits:d}).format(n);
const fmtM = n => fmt(n/1e6,1)+"M";
const fmtPct = n => (n*100).toFixed(1)+"%";

function calcIRR(cfs, guess=0.1) {
  let r=guess;
  for(let i=0;i<500;i++){let f=0,df=0;for(let j=0;j<cfs.length;j++){const p=Math.pow(1+r,j);f+=cfs[j]/p;df-=j*cfs[j]/(p*(1+r));}if(Math.abs(df)<1e-12)break;const nr=r-f/df;if(Math.abs(nr-r)<1e-8)return nr;r=Math.max(-0.99,Math.min(10,nr));}
  return r;
}
function calcNPV(rate,cfs){return cfs.reduce((s,cf,i)=>s+cf/Math.pow(1+rate,i),0);}

/* ─── Assumptions (mutable) ─── */
const A = {
  landPrice:200000000, transferFeePct:0.03,
  totalKeys:70, roundADR:4500,
  buildingSqm:5650, circSqm:3100, landsSqm:6400,
  buildCost:50000, circCost:15000, landsCost:5000,
  utilPct:0.10, designPct:0.05, preopPct:0.05, ffePct:0.14,
  debtPct:0.50, mlrBase:0.07, mlrCap:0.08, mlrGrow:0.0025,
  roomRatio:0.70, fbRatio:0.30, otherRevPct:0.05,
  occY1:0.55, occY2:0.62, occY3:0.68,
  revGrowth:0.03, inflRate:0.03,
  staffN:55, staffPay:15000, mgtN:12, mgtPay:45000, gmPay:150000,
  elecPerRoom:12000, waterPerRoom:5000, netPerRoom:5000,
  maintPct:0.015, suppPct:0.05, sellPct:0.03, fbCostPct:0.50, otherPct:0.01,
  mgtFeePct:0.0, propTaxPct:0.015, ffeResPct:0.03, capexPct:0.015,
  discRate:0.08, taxRate:0.20,
  repayStart:3, repayYears:14, repayGrowth:0.10, repayBase:15000000
};

/* ─── Compute 30-Year Model ─── */
function computeModel() {
  const a = A;
  const consCost = a.buildingSqm*a.buildCost + a.circSqm*a.circCost + a.landsSqm*a.landsCost;
  const utilCost = consCost*a.utilPct, desCost = consCost*a.designPct, preoCost = consCost*a.preopPct, ffeCost = consCost*a.ffePct;
  const transFee = a.landPrice*a.transferFeePct;
  const totalDev = consCost + utilCost + desCost + preoCost + ffeCost + a.landPrice + transFee;
  const bankLoan = Math.ceil(totalDev*a.debtPct/1e5)*1e5;
  const equity = totalDev - bankLoan;

  const mlr = yr => Math.min(a.mlrBase + yr*a.mlrGrow, a.mlrCap);
  const bY1 = Math.round(bankLoan*0.75/1e5)*1e5, bY0 = bankLoan - bY1;
  const intYm1 = bY1/2*mlr(0), intY0 = bY1*mlr(1) + bY0/2*mlr(1);
  const capInt = intYm1 + intY0;
  const totalProjectCost = totalDev + capInt;

  const repSch = []; let rTot = 0;
  for(let i=0;i<a.repayYears;i++){const yr=a.repayStart+i;if(i<a.repayYears-1){const am=Math.ceil(a.repayBase*Math.pow(1+a.repayGrowth,i)/1e5)*1e5;repSch.push({yr:yr,amt:am});rTot+=am;}else{repSch.push({yr:yr,amt:Math.max(0,bankLoan-rTot)});}}

  const depB=(consCost+ffeCost)*0.9/30, depF=(consCost+ffeCost)*0.1/5, depC=capInt/30;

  const years=[], capexArr=[];
  let loan=bankLoan;
  const losses=[-(intYm1),-(intY0)];

  for(let yr=1;yr<=30;yr++){
    const occ=yr===1?a.occY1:yr===2?a.occY2:a.occY3;
    const g=yr<=1?1:Math.pow(1+a.revGrowth,yr-1);
    const inf=yr<=1?1:Math.pow(1+a.inflRate,yr-1);
    const adr=a.roundADR*g;
    const roomRev=a.totalKeys*adr*365*occ;
    const fbRev=roomRev*a.fbRatio/a.roomRatio;
    const otherRev=(roomRev+fbRev)*a.otherRevPct;
    const totalRev=roomRev+fbRev+otherRev;

    const staff=a.staffN*a.staffPay*12*inf, mgt=a.mgtN*a.mgtPay*12*inf, gm=a.gmPay*12*inf;
    const elec=a.elecPerRoom*a.totalKeys*occ*12*inf, water=a.waterPerRoom*a.totalKeys*occ*12*inf;
    const maint=roomRev*a.maintPct, net=a.netPerRoom*a.totalKeys*12*inf;
    const supp=a.suppPct*a.roundADR*a.totalKeys*a.occY1*365*inf;
    const sell=totalRev*a.sellPct, fbCost=fbRev*a.fbCostPct, oth=totalRev*a.otherPct;
    const propTax=totalRev*a.propTaxPct, ffeRes=totalRev*a.ffeResPct;
    const totalOpex=staff+mgt+gm+elec+water+maint+net+supp+sell+fbCost+oth+propTax+ffeRes;
    const ebitda=totalRev-totalOpex;
    const ebitdaMargin=totalRev>0?ebitda/totalRev:0;

    const capex=totalRev*a.capexPct; capexArr.push(capex);
    let d179=0; for(let y=0;y<capexArr.length;y++){if(yr-(y+1)<5)d179+=(y===0?capexArr[y]/2:capexArr[y])/5;}
    const totalDep=depB+(yr<=5?depF:0)+depC+d179;
    const ebit=ebitda-totalDep;

    const rate=mlr(yr+1);
    const intExp=loan*Math.min(rate,a.mlrCap);
    const rep=repSch.find(function(r){return r.yr===yr;});
    const repayAmt=rep?rep.amt:0;
    const ebt=ebit-intExp;

    let ti=ebt;
    if(ti>0){for(let l=0;l<losses.length;l++){if(losses[l]<0&&ti>0){const u=Math.min(ti,-losses[l]);ti-=u;losses[l]+=u;}}}else{losses.push(ti);ti=0;}
    const tax=Math.max(0,ti*a.taxRate);
    const netProfit=ebt-tax;
    const cfExFin=ebitda-capex-tax;
    const netCF=cfExFin-intExp-repayAmt;
    loan=Math.max(0,loan-repayAmt);

    years.push({yr:yr,occ:occ,adr:adr,roomRev:roomRev,fbRev:fbRev,otherRev:otherRev,totalRev:totalRev,totalOpex:totalOpex,ebitda:ebitda,ebitdaMargin:ebitdaMargin,capex:capex,totalDep:totalDep,ebit:ebit,intExp:intExp,repayAmt:repayAmt,ebt:ebt,tax:tax,netProfit:netProfit,cfExFin:cfExFin,netCF:netCF,outstandingLoan:loan});
  }

  let run=-totalProjectCost; years.forEach(function(y){run+=y.cfExFin;y.accumCF=run;});
  const cfIRR=[-(totalProjectCost*0.25),-(totalProjectCost*0.75)].concat(years.map(function(y){return y.cfExFin;}));
  const irr=calcIRR(cfIRR,0.08), npv=calcNPV(a.discRate,cfIRR);
  let payback=30,pbc=-totalProjectCost;
  for(let i=0;i<years.length;i++){const p=pbc;pbc+=years[i].cfExFin;if(pbc>0&&p<=0){payback=(i+1)+(-p/years[i].cfExFin);break;}}

  return {consCost:consCost,utilCost:utilCost,desCost:desCost,preoCost:preoCost,ffeCost:ffeCost,transFee:transFee,totalDev:totalDev,totalProjectCost:totalProjectCost,bankLoan:bankLoan,equity:equity,capInt:capInt,years:years,irr:irr,npv:npv,payback:payback};
}

/* ─── Tab Bar ─── */
function buildTabs() {
  var bar = document.getElementById("tab-bar");
  bar.innerHTML = "";
  var tabNames = {overview:"Overview",assumptions:"Assumptions",cashflow:"Cash Flow",pnl:"P&L"};
  ["overview","assumptions","cashflow","pnl"].forEach(function(id) {
    var btn = document.createElement("button"); btn.className="tab-btn"+(activeTab===id?" active":"");
    btn.textContent = tabNames[id];
    btn.onclick = function() { activeTab=id; buildTabs(); renderContent(); };
    bar.appendChild(btn);
  });
}

/* ─── Render Content ─── */
function renderContent() {
  var el = document.getElementById("content");
  Object.keys(charts).forEach(function(k){charts[k].destroy(); delete charts[k];});

  if(activeTab==="overview") renderOverview(el);
  else if(activeTab==="assumptions") renderAssumptions(el);
  else if(activeTab==="cashflow") renderCashFlow(el);
  else renderPnL(el);
}

/* ─── Excel Export (JSZip – preserves all formatting) ─── */
function colLetter(c){var s='';while(c>=0){s=String.fromCharCode(65+c%26)+s;c=Math.floor(c/26)-1;}return s;}

async function exportXLSX() {
  var a=A;
  // Decode embedded template
  var raw = atob(TEMPLATE_B64);
  var arr = new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);

  var zip = await JSZip.loadAsync(arr);
  var xml = await zip.file("xl/worksheets/sheet1.xml").async("string");

  // Build map of cells to update: {cellRef: value}
  var cells = {};
  // Land & Development
  cells['D7']=a.landPrice; cells['D44']=a.transferFeePct;
  cells['D21']=a.totalKeys; cells['D34']=a.buildCost;
  cells['D35']=a.circCost; cells['D36']=a.landsCost;
  cells['D39']=a.utilPct; cells['D40']=a.designPct;
  cells['D41']=a.preopPct; cells['D42']=a.ffePct;
  // Revenue
  cells['D62']=a.roundADR; cells['D63']=a.roomRatio;
  cells['E63']=a.fbRatio; cells['D64']=a.otherRevPct;
  // Occupancy
  cells['I95']=a.occY1; cells['J95']=a.occY2; cells['K95']=a.occY3;
  for(var ci=12;ci<=38;ci++) cells[colLetter(ci-1)+'95']=a.occY3;
  // Growth rates
  cells['J90']=a.inflRate; cells['J92']=a.revGrowth;
  // Financing
  cells['D49']=a.debtPct; cells['D55']=a.mlrBase;
  // Staff
  cells['D68']=a.staffN; cells['F68']=a.staffPay;
  cells['D69']=a.mgtN; cells['F69']=a.mgtPay;
  cells['D70']=1; cells['F70']=a.gmPay;
  // OPEX
  cells['D71']=a.elecPerRoom; cells['D72']=a.waterPerRoom;
  cells['D73']=a.maintPct; cells['D74']=a.netPerRoom;
  cells['D75']=a.suppPct; cells['D76']=a.sellPct;
  cells['D77']=a.fbCostPct; cells['D78']=a.otherPct;
  cells['D81']=a.mgtFeePct; cells['D83']=a.propTaxPct;
  cells['D84']=a.ffeResPct; cells['D85']=a.capexPct;

  // Replace cell values in XML, preserving style (s=) and structure
  for(var ref in cells) {
    var val = cells[ref];
    // Match <c r="REF" ...>...<v>...</v>...</c> and replace only <v> content
    var pat = new RegExp('(<c\\s+r="'+ref+'"[^>]*>)(.*?)(</c>)', 's');
    var m = xml.match(pat);
    if(m) {
      var inner = m[2];
      // Replace <v>...</v> with new value
      inner = inner.replace(/<v>[^<]*<\/v>/, '<v>'+val+'</v>');
      xml = xml.replace(pat, m[1]+inner+m[3]);
    }
  }

  zip.file("xl/worksheets/sheet1.xml", xml);

  var blob = await zip.generateAsync({type:"blob", compression:"DEFLATE"});
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.href = url;
  link.download = "Cash Flow (8 Rai Chaweng Resort).xlsx";
  link.click();
  URL.revokeObjectURL(url);
}

  renderContent();
}
